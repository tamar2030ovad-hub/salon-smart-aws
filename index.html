<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Salon Smart – קביעת תור</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #fce4ec, #f8bbd0); min-height: 100vh; }
  .header { background: linear-gradient(135deg, #e91e63, #c2185b); color: white; text-align: center; padding: 30px; }
  .header h1 { font-size: 2.5em; margin-bottom: 5px; }
  .header p { font-size: 1.1em; opacity: 0.9; }
  .container { max-width: 800px; margin: 30px auto; padding: 0 20px; }
  .card { background: white; border-radius: 16px; padding: 30px; margin-bottom: 25px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
  .card h2 { color: #e91e63; margin-bottom: 20px; font-size: 1.4em; border-bottom: 2px solid #fce4ec; padding-bottom: 10px; }
  .form-group { margin-bottom: 18px; }
  .form-group label { display: block; margin-bottom: 6px; color: #555; font-weight: 600; }
  .form-group input, .form-group select { width: 100%; padding: 12px; border: 2px solid #f8bbd0; border-radius: 8px; font-size: 1em; transition: border-color 0.3s; }
  .form-group input:focus, .form-group select:focus { outline: none; border-color: #e91e63; }
  .btn { background: linear-gradient(135deg, #e91e63, #c2185b); color: white; border: none; padding: 14px 30px; border-radius: 8px; font-size: 1em; cursor: pointer; width: 100%; font-weight: 600; transition: transform 0.2s; }
  .btn:hover { transform: translateY(-2px); }
  .services-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; }
  .service-card { background: linear-gradient(135deg, #fce4ec, #f8bbd0); border-radius: 12px; padding: 20px; text-align: center; border: 2px solid transparent; cursor: pointer; transition: all 0.3s; }
  .service-card:hover { border-color: #e91e63; transform: translateY(-3px); }
  .service-card h3 { color: #c2185b; margin-bottom: 8px; }
  .service-card p { color: #666; font-size: 0.9em; }
  .message { padding: 15px; border-radius: 8px; margin-top: 15px; text-align: center; font-weight: 600; display: none; }
  .message.success { background: #e8f5e9; color: #2e7d32; border: 2px solid #a5d6a7; }
  .message.error { background: #ffebee; color: #c62828; border: 2px solid #ef9a9a; }
  .appointments-list { margin-top: 15px; }
  .appointment-item { background: #fce4ec; border-radius: 10px; padding: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
  .appointment-item .details { flex: 1; }
  .appointment-item .details h4 { color: #c2185b; margin-bottom: 4px; }
  .appointment-item .details p { color: #666; font-size: 0.9em; }
  .cancel-btn { background: #ef5350; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 0.9em; }
  .cancel-btn:hover { background: #c62828; }
  .tabs { display: flex; gap: 10px; margin-bottom: 25px; }
  .tab { flex: 1; padding: 12px; text-align: center; border-radius: 8px; cursor: pointer; font-weight: 600; background: white; color: #e91e63; border: 2px solid #e91e63; transition: all 0.3s; }
  .tab.active { background: #e91e63; color: white; }
  .tab-content { display: none; }
  .tab-content.active { display: block; }
</style>
</head>
<body>

<div class="header">
  <h1>💅 Salon Smart</h1>
  <p>סטודיו מקצועי לטיפוח ציפורניים</p>
</div>

<div class="container">
  <div class="tabs">
    <div class="tab active" onclick="switchTab('book', event)">קביעת תור</div>
    <div class="tab" onclick="switchTab('services', event)">השירותים שלנו</div>
    <div class="tab" onclick="switchTab('manage', event)">ניהול תורים</div>
  </div>

  <div id="book" class="tab-content active">
    <div class="card">
      <h2>📅 קבעי תור עכשיו</h2>
      <div class="form-group">
        <label>שם מלא</label>
        <input type="text" id="client_name" placeholder="הכניסי את שמך המלא">
      </div>
      <div class="form-group">
        <label>מספר טלפון</label>
        <input type="tel" id="client_phone" placeholder="050-0000000">
      </div>
      <div class="form-group">
        <label>כתובת מייל</label>
        <input type="email" id="email" placeholder="your@email.com">
      </div>
      <div class="form-group">
        <label>בחירת שירות</label>
        <select id="service_name">
          <option value="">טוענת שירותים...</option>
        </select>
      </div>
      <div class="form-group">
        <label>תאריך</label>
        <input type="date" id="date">
      </div>
      <div class="form-group">
        <label>שעה</label>
        <select id="time">
          <option value="09:00">09:00</option>
          <option value="10:00">10:00</option>
          <option value="11:00">11:00</option>
          <option value="12:00">12:00</option>
          <option value="13:00">13:00</option>
          <option value="14:00">14:00</option>
          <option value="15:00">15:00</option>
          <option value="16:00">16:00</option>
          <option value="17:00">17:00</option>
          <option value="18:00">18:00</option>
        </select>
      </div>
      <button class="btn" onclick="bookAppointment()">קבעי תור ✨</button>
      <div id="book-message" class="message"></div>
    </div>
  </div>

  <div id="services" class="tab-content">
    <div class="card">
      <h2>✨ השירותים שלנו</h2>
      <div id="services-grid" class="services-grid">
        <p>טוענת שירותים...</p>
      </div>
    </div>
  </div>

  <div id="manage" class="tab-content">
    <div class="card">
      <h2>📋 התורים שלי</h2>
      <div class="form-group">
        <label>מספר טלפון לחיפוש</label>
        <input type="tel" id="search_phone" placeholder="050-0000000">
      </div>
      <button class="btn" onclick="loadAppointments()">חפשי תורים</button>
      <div id="appointments-list" class="appointments-list"></div>
    </div>
  </div>
</div>

<script>
const API_URL = 'https://rnajpp4odj.execute-api.us-east-1.amazonaws.com/prod';

async function loadServices() {
  try {
    const res = await fetch(`${API_URL}/services`);
    const services = await res.json();
    const select = document.getElementById('service_name');
    const grid = document.getElementById('services-grid');
    select.innerHTML = '<option value="">בחרי שירות</option>';
    grid.innerHTML = '';
    services.forEach(s => {
      select.innerHTML += `<option value="${s.name}">${s.name} – ₪${s.price}</option>`;
      grid.innerHTML += `
        <div class="service-card">
          <h3>${s.name}</h3>
          <p>💰 ₪${s.price}</p>
          <p>⏱️ ${s.duration_min} דקות</p>
        </div>`;
    });
  } catch(e) {
    console.error('Error loading services:', e);
  }
}

async function bookAppointment() {
  const data = {
    client_name: document.getElementById('client_name').value,
    client_phone: document.getElementById('client_phone').value,
    email: document.getElementById('email').value,
    service_name: document.getElementById('service_name').value,
    date: document.getElementById('date').value,
    time: document.getElementById('time').value
  };
  if (!data.client_name || !data.client_phone || !data.service_name || !data.date) {
    showMessage('book-message', 'נא למלא את כל השדות', 'error');
    return;
  }
  try {
    const res = await fetch(`${API_URL}/appointments`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(data)
    });
    const result = await res.json();
    showMessage('book-message', result.message || 'התור נקבע בהצלחה! 🎉', 'success');
  } catch(e) {
    showMessage('book-message', 'שגיאה בקביעת התור', 'error');
  }
}

async function loadAppointments() {
  const phone = document.getElementById('search_phone').value;
  try {
    const res = await fetch(`${API_URL}/appointments`);
    const all = await res.json();
    const filtered = phone ? all.filter(a => a.client_phone === phone && a.status === 'active') : all.filter(a => a.status === 'active');
    const list = document.getElementById('appointments-list');
    if (filtered.length === 0) {
      list.innerHTML = '<p style="text-align:center;color:#999;margin-top:15px">לא נמצאו תורים</p>';
      return;
    }
    list.innerHTML = filtered.map(a => `
      <div class="appointment-item">
        <div class="details">
          <h4>${a.client_name}</h4>
          <p>${a.service_name} | ${a.date} | ${a.time}</p>
        </div>
        <button class="cancel-btn" onclick="cancelAppointment('${a.appointment_id}')">ביטול</button>
      </div>`).join('');
  } catch(e) {
    console.error('Error:', e);
  }
}

async function cancelAppointment(id) {
  if (!confirm('האם לבטל את התור?')) return;
  try {
    await fetch(`${API_URL}/appointments/${id}`, { method: 'DELETE' });
    loadAppointments();
  } catch(e) {
    console.error('Error:', e);
  }
}

function showMessage(id, text, type) {
  const el = document.getElementById(id);
  el.textContent = text;
  el.className = `message ${type}`;
  el.style.display = 'block';
  setTimeout(() => el.style.display = 'none', 4000);
}

function switchTab(tab, event) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.getElementById(tab).classList.add('active');
  event.target.classList.add('active');
}

const today = new Date().toISOString().split('T')[0];
document.getElementById('date').min = today;
loadServices();
</script>
</body>
</html>
